name: Docs Hygiene

on:
  pull_request:
    paths:
      - "**/*.md"
      - "product-development/feature-index.yaml"
      - ".linkcheck-ignore.txt"
      - "scripts/*.py"
      - ".github/workflows/docs-hygiene.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "product-development/feature-index.yaml"
      - ".linkcheck-ignore.txt"
      - "scripts/*.py"
      - ".github/workflows/docs-hygiene.yml"
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate feature index paths
        run: python3 scripts/validate_feature_index.py

      - name: Check markdown local links
        run: python3 scripts/check_markdown_links.py
